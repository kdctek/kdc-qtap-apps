<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qTap Apps</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,sans-serif;color:#1d2327;background:#f9f9f9;line-height:1.6}
.header{background:#fff;border-bottom:3px solid #e36d1e;padding:16px 0}
.header-inner{max-width:800px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:700;color:#1d2327;text-decoration:none;display:flex;align-items:center;gap:8px}
.logo span{color:#e36d1e}
.header a.site{color:#e36d1e;text-decoration:none;font-weight:600;font-size:14px}
.header a.site:hover{text-decoration:underline}
main{max-width:800px;margin:0 auto;padding:32px 20px 64px}
h1{font-size:24px;margin-bottom:8px}
.subtitle{color:#646970;font-size:14px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.card{background:#fff;border:1px solid #dcdcde;border-radius:6px;padding:20px;text-decoration:none;color:inherit;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:#e36d1e;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card h2{font-size:16px;margin-bottom:4px;color:#1d2327}
.card .version{font-size:12px;color:#646970;background:#f0f0f1;padding:2px 8px;border-radius:3px;display:inline-block;margin-bottom:8px}
.card .desc{font-size:13px;color:#646970}
.footer{text-align:center;padding:24px 20px;color:#646970;font-size:13px}
.footer a{color:#e36d1e;text-decoration:none}
.footer a:hover{text-decoration:underline}
@media(max-width:500px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header"><div class="header-inner">
<span class="logo"><span>q</span>Tap Apps</span>
<a href="https://qtap.app" class="site">qtap.app</a>
</div></div>
<main>
<h1>qTap Apps Registry</h1>
<p class="subtitle">Changelogs and version history for the qTap WordPress plugin suite.</p>
<div class="grid" id="apps"></div>
</main>
<div class="footer"><a href="https://qtap.app">qtap.app</a></div>
<script>
const slugToId={
'kdc-qtap':'qtap','kdc-qtap-mobile':'mobile','kdc-qtap-finance':'finance',
'kdc-qtap-events':'events','kdc-qtap-admin':'admin','kdc-qtap-wa':'wa','kdc-qtap-kyc':'kyc'
};
fetch('versions.json').then(r=>r.json()).then(data=>{
const grid=document.getElementById('apps');
Object.entries(data.plugins).forEach(([slug,info])=>{
const id=slugToId[slug]||slug;
const a=document.createElement('a');
a.href=id+'/';a.className='card';
a.innerHTML=`<h2>${info.name}</h2><span class="version">v${info.version}</span><p class="desc">View changelog</p>`;
grid.appendChild(a);
});
});
</script>
</body>
</html>
