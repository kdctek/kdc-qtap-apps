<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qTap KYC — Changelog</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,sans-serif;color:#1d2327;background:#f9f9f9;line-height:1.6}
.header{background:#fff;border-bottom:3px solid #e36d1e;padding:16px 0}
.header-inner{max-width:800px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.header a{color:#e36d1e;text-decoration:none;font-weight:600;font-size:14px}
.header a:hover{text-decoration:underline}
.logo{font-size:20px;font-weight:700;color:#1d2327;text-decoration:none;display:flex;align-items:center;gap:8px}
.logo span{color:#e36d1e}
main{max-width:800px;margin:0 auto;padding:32px 20px 64px}
h1{font-size:24px;margin-bottom:24px;color:#1d2327;border-bottom:1px solid #dcdcde;padding-bottom:12px}
#changelog{background:#fff;border:1px solid #dcdcde;border-radius:6px;padding:32px;min-height:200px}
#changelog h2{font-size:18px;margin:32px 0 12px;padding:8px 0 8px;border-bottom:1px solid #f0f0f1;color:#1d2327}
#changelog h2:first-child{margin-top:0}
#changelog h3{font-size:14px;font-weight:600;color:#e36d1e;margin:16px 0 8px;text-transform:uppercase;letter-spacing:0.5px}
#changelog ul{margin:0 0 16px 20px}
#changelog li{margin:4px 0;font-size:14px;color:#3c434a}
#changelog p{margin:8px 0;font-size:14px;color:#3c434a}
#changelog strong{color:#1d2327}
#changelog code{background:#f0f0f1;padding:2px 6px;border-radius:3px;font-size:13px}
.loading{text-align:center;color:#646970;padding:40px;font-size:14px}
.footer{text-align:center;padding:24px 20px;color:#646970;font-size:13px}
.footer a{color:#e36d1e;text-decoration:none}
.footer a:hover{text-decoration:underline}
@media(max-width:600px){main{padding:20px 12px 48px}#changelog{padding:20px}}
</style>
</head>
<body>
<div class="header"><div class="header-inner">
<a href="../" class="logo"><span>q</span>Tap Apps</a>
<a href="../">All Apps</a>
</div></div>
<main>
<h1>KYC — Changelog</h1>
<div id="changelog"><div class="loading">Loading changelog...</div></div>
</main>
<div class="footer"><a href="https://qtap.app">qtap.app</a></div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
fetch('CHANGELOG.md').then(r=>{if(!r.ok)throw r;return r.text()}).then(md=>{
document.getElementById('changelog').innerHTML=marked.parse(md);
document.querySelectorAll('#changelog h2').forEach(h=>{
const id=h.textContent.replace(/[^\w.-]/g,'-').toLowerCase();
h.id=id;h.style.cursor='pointer';
h.addEventListener('click',()=>{location.hash=id});
});
}).catch(()=>{document.getElementById('changelog').innerHTML='<p class="loading">No changelog available yet.</p>'});
</script>
</body>
</html>
