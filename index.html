<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qTap Apps</title>
<style>
:root{--bg:#f6f8fa;--bg-card:#fff;--bg-hover:#f0f1f3;--text:#1f2328;--text-secondary:#656d76;--border:#d1d9e0;--accent:#e36d1e;--accent-hover:#c75a12;--badge-bg:#f0f0f1;--badge-text:#656d76;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--shadow-hover:0 4px 12px rgba(0,0,0,.08);--radius:10px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",Helvetica,Arial,sans-serif;--mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--bg-card:#161b22;--bg-hover:#1c2128;--text:#e6edf3;--text-secondary:#8b949e;--border:#30363d;--badge-bg:#21262d;--badge-text:#8b949e;--shadow:0 1px 3px rgba(0,0,0,.2);--shadow-hover:0 4px 12px rgba(0,0,0,.3)}}
[data-theme=light]{--bg:#f6f8fa;--bg-card:#fff;--bg-hover:#f0f1f3;--text:#1f2328;--text-secondary:#656d76;--border:#d1d9e0;--badge-bg:#f0f0f1;--badge-text:#656d76;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--shadow-hover:0 4px 12px rgba(0,0,0,.08)}
[data-theme=dark]{--bg:#0d1117;--bg-card:#161b22;--bg-hover:#1c2128;--text:#e6edf3;--text-secondary:#8b949e;--border:#30363d;--badge-bg:#21262d;--badge-text:#8b949e;--shadow:0 1px 3px rgba(0,0,0,.2);--shadow-hover:0 4px 12px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s}
.header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:16px 0;position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);transition:background .3s,border-color .3s}
.header-inner{max-width:960px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:700;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:6px;letter-spacing:-.02em}
.logo span{color:var(--accent)}.logo-icon{transition:filter .3s}
[data-theme=dark] .logo-icon{filter:invert(1)}
@media(prefers-color-scheme:dark){:root:not([data-theme=light]) .logo-icon{filter:invert(1)}}
.header-actions{display:flex;align-items:center;gap:16px}
.header-actions a{color:var(--text-secondary);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s}
.header-actions a:hover{color:var(--accent)}
.theme-toggle{background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;padding:6px 8px;color:var(--text-secondary);font-size:16px;line-height:1;transition:border-color .2s,color .2s}
.theme-toggle:hover{border-color:var(--accent);color:var(--text)}
main{max-width:960px;margin:0 auto;padding:40px 24px 80px}
.hero{margin-bottom:40px}
.hero h1{font-size:28px;font-weight:700;letter-spacing:-.03em;margin-bottom:6px}
.hero p{color:var(--text-secondary);font-size:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 20px 0;transition:border-color .2s,box-shadow .2s,background .3s;display:flex;flex-direction:column}
.card:hover{border-color:var(--accent);box-shadow:var(--shadow-hover)}
.card-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.card h2{font-size:16px;font-weight:600;letter-spacing:-.01em}
.card .version{font-family:var(--mono);font-size:12px;color:var(--badge-text);background:var(--badge-bg);padding:3px 8px;border-radius:6px;white-space:nowrap}
.card .desc{font-size:13px;color:var(--text-secondary);line-height:1.5;flex:1}
.card-docs{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.card-docs a{font-size:12px;color:var(--text-secondary);text-decoration:none;padding:4px 10px;border-radius:6px;background:var(--badge-bg);transition:color .2s,background .2s}
.card-docs a:hover{color:var(--accent);background:var(--bg-hover)}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin:16px -20px 0;padding:12px 20px;border-top:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);text-decoration:none;color:var(--text);font-size:14px;font-weight:500;transition:background .2s,color .2s}
.card-footer:hover{background:var(--bg-hover);color:var(--accent)}
.card-footer .arrow{font-size:16px;transition:transform .2s}
.card-footer:hover .arrow{transform:translateX(3px)}
.footer{text-align:center;padding:32px 24px;color:var(--text-secondary);font-size:13px;border-top:1px solid var(--border)}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}
@media(max-width:600px){.grid{grid-template-columns:1fr}.hero h1{font-size:22px}main{padding:24px 16px 60px}}
</style>
</head>
<body>
<div class="header"><div class="header-inner">
<span class="logo"><img src="qtap-logo.svg" alt="" width="24" height="24" class="logo-icon">qTap Apps</span>
<div class="header-actions">
<a href="https://qtap.app">qtap.app</a>
<button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark/light theme">
<span id="theme-icon"></span>
</button>
</div>
</div></div>
<main>
<div class="hero">
<h1>qTap Apps Registry</h1>
<p>Changelogs, documentation, and version history for the qTap WordPress plugin suite.</p>
</div>
<div class="grid" id="apps"></div>
</main>
<div class="footer"><a href="https://qtap.app">qtap.app</a></div>
<script>
const slugToId={'kdc-qtap':'qtap','kdc-qtap-mobile':'mobile','kdc-qtap-finance':'finance','kdc-qtap-events':'events','kdc-qtap-admin':'admin','kdc-qtap-wa':'wa','kdc-qtap-kyc':'kyc'};

function getTheme(){return localStorage.getItem('theme')||'auto'}
function applyTheme(t){
if(t==='auto'){document.documentElement.removeAttribute('data-theme')}
else{document.documentElement.setAttribute('data-theme',t)}
updateIcon();
}
function toggleTheme(){
const cur=getTheme();
const next=cur==='auto'?'dark':cur==='dark'?'light':'auto';
localStorage.setItem('theme',next);applyTheme(next);
}
function updateIcon(){
const t=getTheme();const el=document.getElementById('theme-icon');
if(t==='dark')el.textContent='\u{1F319}';
else if(t==='light')el.textContent='\u2600\uFE0F';
else el.textContent='\u{1F5A5}\uFE0F';
}
applyTheme(getTheme());

fetch('versions.json').then(r=>r.json()).then(data=>{
const grid=document.getElementById('apps');
Object.entries(data.plugins).forEach(([slug,info])=>{
const id=slugToId[slug]||slug;
const card=document.createElement('div');
card.className='card';
let docs='';
if(info.docs&&info.docs.length){
docs='<div class="card-docs">';
info.docs.forEach(d=>{
docs+=`<a href="${id}/?doc=${d.file.replace('.md','')}">${d.name}</a>`;
});
docs+='</div>';
}
card.innerHTML=`<div class="card-header"><h2>${info.name}</h2><span class="version">v${info.version}</span></div><p class="desc">${info.description||''}</p>${docs}<a href="${id}/" class="card-footer">Changelog<span class="arrow">&rarr;</span></a>`;
grid.appendChild(card);
});
});
</script>
</body>
</html>
